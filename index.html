<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VexelSoft Store</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<header class="topbar">
  <button id="menuBtn"><i class="fas fa-bars"></i></button>

  <div class="brand">
    <img src="logo.png" alt="Logo">
    <div>
      <h3>VEXELSOFT</h3>
      <span>BOT STORE</span>
    </div>
  </div>

  <button class="cart">
    <i class="fas fa-shopping-bag"></i>
  </button>
</header>

<aside id="sidebar">
  <a href="#">🏠 Beranda</a>
  <a href="#">🤖 Jasa Jadi Bot</a>
  <a href="#">👨‍💻 Developer</a>
  <a href="#">🔰 Sewa Bot</a>
  <a href="#">👤 Premium User</a>
  <a href="#">👥 Premium Grup</a>
</aside>

<main class="container">

  <section class="date-card">
    <h5>HARI & TANGGAL</h5>
    <h2>Minggu, 31 Mei 2026</h2>
  </section>

  <section class="banner">
    <img src="banner.jpg" alt="Banner">
  </section>

  <h3>KATEGORI LAYANAN</h3>

  <div class="categories">
    <div class="category">🤖<span>Jadi Bot</span></div>
    <div class="category active">🔰<span>Sewa Bot</span></div>
    <div class="category">👤<span>Premium</span></div>
  </div>

  <div class="product">
    <h3>Premium User</h3>
    <p>Rp 5.000</p>
  </div>

  <div class="product">
    <h3>Premium Grup</h3>
    <p>Rp 10.000</p>
  </div>

  <div class="product">
    <h3>Sewa Bot</h3>
    <p>Rp 15.000</p>
  </div>

</main>

<script src="script.js"></script>
</body>
</html>
